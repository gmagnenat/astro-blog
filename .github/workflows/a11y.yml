name: Accessibility

on:
  pull_request:
  push:
    branches: [main, develop]

jobs:
  a11y:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Static gate: same a11y lint that runs pre-commit, over all .astro files.
      - run: pnpm lint

      - run: pnpm exec playwright install --with-deps chromium

      # Deep gate: axe scan per route. webServer (pnpm preview) serves dist/, so build first.
      - run: pnpm build
      - run: pnpm exec playwright test a11y

      - if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
